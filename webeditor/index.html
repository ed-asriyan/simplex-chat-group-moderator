<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Moderator — Rules Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            padding: 1.5rem;
            background: #f8f9fa;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
        }

        #editor_holder .card {
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container-fluid" style="max-width: 1400px">
        <h1>Rules Editor for <a href="https://simplex-directory.asriyan.me/#/bots/63d110f4-9f70-4128-b0e7-5a8958299f96"
                target="_blank">Moderator
                Bot</a></h1>
        <div id="subtitle" class="mb-3"></div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body" id="editor_holder">
                        <div class="text-muted small">Loading editor…</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@json-editor/json-editor@2.15.2/dist/jsoneditor.min.js"></script>
    <script>
        function parseHash() {
            const result = {};
            for (const part of window.location.hash.slice(1).split('&')) {
                const idx = part.indexOf('=');
                if (idx >= 0) result[part.slice(0, idx)] = part.slice(idx + 1);
            }
            return result;
        }

        function renderSubtitle() {
            const { bot_id } = parseHash();
            const el = document.getElementById('subtitle');
            if (bot_id) {
                el.innerHTML = `
                    <p class="text-muted mb-2">Add, edit, or delete the rules below. When done, apply your changes.</p>
                    <button class="btn btn-danger btn-sm" id="apply-btn">Apply Changes</button>
                `;
                document.getElementById('apply-btn').addEventListener('click', () => {
                    const link = `[Rules for group ${bot_id}](${window.location.href})`;
                    navigator.clipboard.writeText(link)
                        .then(() => alert('The link is copied to clipboard. Send it to the bot to apply the changes.'))
                        .catch(() => alert('Please copy the URL from the address bar and send it to the bot.'));
                });
            } else {
                el.innerHTML = `<p class="text-danger mb-0">No bot ID found in URL. Did you open this link manually?</p>`;
            }
        }

        renderSubtitle();

        async function init() {
            const schema = await fetch('rules-schema.json').then(r => r.json());

            // Convert markdown in descriptions to HTML
            function renderMarkdown(obj) {
                if (!obj || typeof obj !== 'object') return;
                if (typeof obj.description === 'string') {
                    obj.description = DOMPurify.sanitize(marked.parseInline(obj.description));
                }
                for (const key of Object.keys(obj)) {
                    renderMarkdown(obj[key]);
                }
            }
            renderMarkdown(schema);

            document.getElementById('editor_holder').innerHTML = '';

            const editor = new JSONEditor(document.getElementById('editor_holder'), {
                schema,
                theme: 'bootstrap5',
                disable_edit_json: true,
                disable_properties: true,
                disable_collapse: false,
                keep_oneof_values: false,
                show_opt_in: false,
                prompt_before_delete: false,
                no_additional_properties: true,
            });

            function updateOutput() {
                const value = editor.getValue();
                const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(value));
                const botId = parseHash().bot_id || '';
                const hashStr = (botId ? `bot_id=${botId}&` : '') + `rules=${compressed}`;
                history.replaceState(null, '', '#' + hashStr);
            }

            editor.on('ready', () => {
                const { rules: rulesCompressed } = parseHash();
                if (rulesCompressed) {
                    try {
                        const data = JSON.parse(LZString.decompressFromEncodedURIComponent(rulesCompressed));
                        editor.setValue(data);
                    } catch (e) {
                        console.warn('Could not restore state from URL hash:', e);
                    }
                }
                updateOutput();
            });

            editor.on('change', updateOutput);
        }

        init().catch(err => {
            document.getElementById('editor_holder').innerHTML =
                `<div class="alert alert-danger">Failed to load editor: ${err.message}</div>`;
        });
    </script>
</body>

</html>
